{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    Volunteer Application Form
                </h2>

                <p class="text-muted text-center mb-4">
                Submit your application to become a volunteer.
                Our team will review your application before approval.
                </p>

                <form method="POST"> <!-- send user data securely to backend. -->

                    {% csrf_token %}  <!-- This protects website against: CSRF attacks Without this:❌ form submission fails.-->

                    {{ form.as_p }}  <!--It automatically renders: name field,email field,phone field,skills field. based on: VolunteerForm -->

                    <div class="text-center">

                        <button type="submit" class="btn btn-primary">
                            Submit Application
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
